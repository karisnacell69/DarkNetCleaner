name: 🚀 Build APK FIXED

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v3

    - name: 🐍 Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: ⚙️ Install System
      run: |
        sudo apt update
        sudo apt install -y zip unzip openjdk-17-jdk git \
        python3-pip autoconf libtool pkg-config zlib1g-dev \
        libncurses5-dev libncursesw5-dev libtinfo5 cmake \
        libffi-dev libssl-dev

    - name: 📦 Install Python Lib
      run: |
        pip install --upgrade pip
        pip install buildozer cython kivy

    - name: 🔧 Setup Buildozer
      run: |
        buildozer init || true

    - name: 🚀 Build APK
      run: |
        buildozer android debug

    - name: 📤 Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: APK
        path: bin/*.apk
